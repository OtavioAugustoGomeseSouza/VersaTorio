services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tcc
      MYSQL_USER: tcc
      MYSQL_PASSWORD: tcc
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: "mysql://tcc:tcc@mysql:3306/tcc"
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: >
      sh -c "
      npm ci &&
      npx prisma generate &&
      npx prisma migrate dev --name init &&
      npm run start:dev
      "

volumes:
  mysql_data:
